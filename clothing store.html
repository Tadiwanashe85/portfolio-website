<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR Studio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
    color: #111;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    position: sticky;
    top: 0;
    background: white;
    border-bottom: 1px solid #eee;
    z-index: 1000;
}

.navbar a {
    text-decoration: none;
    color: #111;
    margin-left: 20px;
    font-weight: 500;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    position: relative;
    animation: fadeIn 1.2s ease;
}

.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

.hero div {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 50px;
    letter-spacing: 2px;
    animation: slideUp 1s ease;
}

.hero p {
    font-size: 18px;
    margin: 10px 0 20px;
    animation: slideUp 1.2s ease;
}

.hero button {
    padding: 12px 25px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    transform: scale(1.05);
}

/* SECTION */
.section {
    padding: 60px 40px;
    text-align: center;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* PRODUCT CARD ANIMATION */
.product {
    transition: all 0.6s ease;
    opacity: 0;
    transform: translateY(40px);
}

.product.show {
    opacity: 1;
    transform: translateY(0);
}

.product img {
    width: 100%;
    border-radius: 5px;
    transition: 0.3s;
}

.product:hover img {
    transform: scale(1.05);
}

.product h3 {
    margin: 10px 0 5px;
}

/* COLLECTION */
.collection {
    display: flex;
    flex-wrap: wrap;
}

.collection div {
    flex: 1;
    min-height: 250px;
    background-size: cover;
    background-position: center;
    transition: 0.5s;
}

.collection div:hover {
    transform: scale(1.02);
}

/* CTA */
.cta {
    background: #111;
    color: white;
    padding: 60px 20px;
    text-align: center;
}

/* FOOTER */
.footer {
    padding: 30px;
    text-align: center;
    background: #f5f5f5;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* MOBILE FRIENDLY */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }

    .hero h1 {
        font-size: 28px;
    }

    .hero p {
        font-size: 14px;
    }

    .section {
        padding: 40px 20px;
    }

    .collection {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>NOIR</h2>
    <div>
        <a href="#">Shop</a>
        <a href="#">Collections</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>Minimal. Bold. Timeless.</h1>
        <p>Discover the new collection</p>
        <button onclick="window.location.href='https://wa.me/263000000000'">
            Shop Now
        </button>
    </div>
</div>

<!-- PRODUCTS -->
<div class="section">
    <h2>Featured Pieces</h2>

    <div class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
            <h3>Essential Tee</h3>
            <p>$20</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1516826957135-700dedea698c">
            <h3>Denim Jacket</h3>
            <p>$60</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f">
            <h3>Signature Hoodie</h3>
            <p>$45</p>
        </div>

    </div>
</div>

<!-- COLLECTION -->
<div class="collection">
    <div style="background-image:url('https://images.unsplash.com/photo-1520975916090-3105956dac38')"></div>
    <div style="background-image:url('https://images.unsplash.com/photo-1503342217505-b0a15ec3261c')"></div>
</div>

<!-- CTA -->
<div class="cta">
    <h2>Own Your Style</h2>
    <p>Order directly via WhatsApp</p>
    <button onclick="window.location.href='https://wa.me/263000000000'">
        Order Now
    </button>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 NOIR Studio</p>
</div>

<script>
/* SCROLL ANIMATION */
const products = document.querySelectorAll(".product");

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
}, {
    threshold: 0.2
});

products.forEach(p => observer.observe(p));
</script>

</body>
</html>
